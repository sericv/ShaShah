<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0e13" />
      <stop offset="100%" stop-color="#08080a" />
    </linearGradient>
    
    <!-- Neon Accent Glow -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9" /> <!-- Purple -->
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" /> <!-- Pink -->
    </linearGradient>

    <!-- Subtle Glow Shadow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Circular background for PWA icon standard masking compatibility -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Glowing Graphic Group -->
  <g transform="translate(96, 96)" filter="url(#neonGlow)">
    <!-- Monitor Outer Frame -->
    <rect x="20" y="20" width="280" height="190" rx="20" fill="none" stroke="url(#neonGrad)" stroke-width="12" />
    
    <!-- Screen Sharing Symbol Inside -->
    <path d="M120 75 L160 115 L120 155" fill="none" stroke="url(#neonGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M200 115 H160" fill="none" stroke="url(#neonGrad)" stroke-width="12" stroke-linecap="round" />
    
    <!-- Monitor Stand -->
    <path d="M130 210 L110 260 H210 L190 210 Z" fill="none" stroke="url(#neonGrad)" stroke-width="12" stroke-linejoin="round" />
    <line x1="90" y1="260" x2="230" y2="260" stroke="url(#neonGrad)" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>
